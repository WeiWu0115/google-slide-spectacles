<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectacles Slide Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background: #111;
        flex-shrink: 0;
      }
      .top-bar input {
        padding: 6px 10px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #222;
        color: #fff;
        font-size: 14px;
      }
      .top-bar button {
        padding: 6px 16px;
        border: none;
        border-radius: 4px;
        background: #4285f4;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }
      .top-bar button:hover { background: #3367d6; }
      .status {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
      }
      .status.connected { background: #0f9d58; }
      .status.disconnected { background: #db4437; }
      .slide-info {
        font-size: 14px;
        color: #aaa;
        margin-left: auto;
      }
      .slide-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .slide-container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .fullscreen-btn {
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 8px 16px;
        background: rgba(66, 133, 244, 0.8);
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        z-index: 100;
      }
      .fullscreen-btn:hover { background: rgba(66, 133, 244, 1); }
      .loading-msg {
        font-size: 20px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <input type="text" id="ws-url" value="wss://google-slide-spectacles.onrender.com" placeholder="WebSocket URL" style="width:320px" />
      <button id="connect-btn" onclick="toggleConnection()">Connect</button>
      <div id="status" class="status disconnected">Disconnected</div>
      <div id="slide-info" class="slide-info">Loading slides...</div>
    </div>

    <div class="slide-container" id="slide-container">
      <div class="loading-msg">Loading presentation...</div>
    </div>

    <button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>

    <script>
      const PRESENTATION_ID = '1M05GYusUYmFbWy95PzXOWKg6ttY-Tx2ToaKZ6Dc0sqg';
      let socket = null;
      let currentSlide = 0;
      let slideIds = [];

      // Fetch slide IDs from our server
      async function loadSlideIds() {
        try {
          const resp = await fetch(`/slide-ids?id=${PRESENTATION_ID}`);
          const data = await resp.json();
          if (data.slideIds && data.slideIds.length > 0) {
            slideIds = data.slideIds;
            console.log('Found slide IDs:', slideIds);
            showSlide(0);
          } else {
            // Fallback: just load the embed without specific slide control
            document.getElementById('slide-container').innerHTML =
              `<iframe src="https://docs.google.com/presentation/d/${PRESENTATION_ID}/embed?start=false&loop=false&delayms=60000&rm=minimal" allowfullscreen="true"></iframe>`;
            document.getElementById('slide-info').textContent = 'Slides loaded (manual navigation)';
          }
        } catch (e) {
          console.error('Error fetching slide IDs:', e);
          document.getElementById('slide-container').innerHTML =
            `<iframe src="https://docs.google.com/presentation/d/${PRESENTATION_ID}/embed?start=false&loop=false&delayms=60000&rm=minimal" allowfullscreen="true"></iframe>`;
        }
      }

      function showSlide(index) {
        if (index < 0 || index >= slideIds.length) return;
        currentSlide = index;
        const slideId = slideIds[index];
        document.getElementById('slide-container').innerHTML =
          `<iframe src="https://docs.google.com/presentation/d/${PRESENTATION_ID}/embed?start=false&loop=false&delayms=60000&rm=minimal&slide=id.${slideId}" allowfullscreen="true"></iframe>`;
        document.getElementById('slide-info').textContent = `Slide ${index + 1} / ${slideIds.length}`;
      }

      function nextSlide() {
        if (currentSlide < slideIds.length - 1) {
          showSlide(currentSlide + 1);
        }
      }

      function previousSlide() {
        if (currentSlide > 0) {
          showSlide(currentSlide - 1);
        }
      }

      function toggleConnection() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.close();
        } else {
          connect();
        }
      }

      function connect() {
        const url = document.getElementById('ws-url').value.trim();
        if (!url) return;

        try {
          socket = new WebSocket(url);

          socket.addEventListener('open', () => {
            document.getElementById('status').textContent = 'Connected';
            document.getElementById('status').className = 'status connected';
            document.getElementById('connect-btn').textContent = 'Disconnect';
          });

          socket.addEventListener('message', (event) => {
            try {
              const data = JSON.parse(event.data);
              if (data.type === 'command' && !data.status) {
                if (data.command === 'next') nextSlide();
                else if (data.command === 'previous') previousSlide();
              }
            } catch (e) {}
          });

          socket.addEventListener('close', () => {
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('status').className = 'status disconnected';
            document.getElementById('connect-btn').textContent = 'Connect';
          });

          socket.addEventListener('error', () => {
            document.getElementById('status').textContent = 'Error';
            document.getElementById('status').className = 'status disconnected';
          });
        } catch (e) {}
      }

      // Keyboard controls
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
          nextSlide();
          if (socket && socket.readyState === WebSocket.OPEN)
            socket.send(JSON.stringify({ type: 'command', command: 'next' }));
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          previousSlide();
          if (socket && socket.readyState === WebSocket.OPEN)
            socket.send(JSON.stringify({ type: 'command', command: 'previous' }));
        }
      });

      function goFullscreen() {
        const el = document.querySelector('.slide-container');
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }

      // Start
      loadSlideIds();
    </script>
  </body>
</html>
